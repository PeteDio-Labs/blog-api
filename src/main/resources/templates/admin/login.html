<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blog Admin</title>

    <!-- Neon Theme CSS -->
    <link rel="stylesheet" th:href="@{/admin/css/neon-theme.css}">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--background-dark);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .login-box {
            background: var(--surface-dark);
            border: 2px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin: 0 0 0.5rem 0;
        }

        .login-header p {
            color: var(--text-secondary);
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: var(--background-dark);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            border: none;
            border-radius: 4px;
            color: var(--background-dark);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-error {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.5);
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(0, 255, 127, 0.1);
            border: 1px solid rgba(0, 255, 127, 0.5);
            color: var(--neon-green);
        }

        .oauth-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .oauth-section p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .btn-oauth {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #333;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-oauth:hover {
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .btn-oauth img {
            width: 20px;
            height: 20px;
        }

        /* Future OAuth - currently disabled */
        .btn-oauth[disabled] {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>BLOG ADMIN</h1>
                <p>Sign in to manage your content</p>
            </div>

            <!-- Error Message -->
            <div class="alert alert-error" th:if="${error}">
                <span class="icon">✗</span>
                <span th:text="${error}">Invalid credentials</span>
            </div>

            <!-- Logout Success Message -->
            <div class="alert alert-success" th:if="${message}">
                <span class="icon">✓</span>
                <span th:text="${message}">Logged out successfully</span>
            </div>

            <!-- Login Form -->
            <form th:action="@{/manage/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="Enter your username"
                           required
                           autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Enter your password"
                           required>
                </div>

                <button type="submit" class="btn-login">
                    Sign In
                </button>
            </form>

            <!-- Future OAuth Section (currently disabled) -->
            <div class="oauth-section" style="display: none;">
                <p>Or sign in with</p>
                <button class="btn-oauth" disabled>
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Sign in with Google
                </button>
                <p style="font-size: 0.875rem; margin-top: 1rem; color: var(--text-secondary);">
                    (Gmail OAuth coming soon)
                </p>
            </div>
        </div>
    </div>
</body>
</html>
