<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">
<head>
    <title>Media Manager</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- Page Header -->
        <div class="page-header">
            <div class="header-left">
                <h2 class="page-title">
                    <span class="neon-text">Media Manager</span>
                    <span class="count-badge" th:text="${media.size()}">0</span>
                </h2>
            </div>
            <div class="header-right">
                <div class="view-toggle">
                    <button class="toggle-btn active" data-view="grid" onclick="switchView('grid')">
                        Grid
                    </button>
                    <button class="toggle-btn" data-view="list" onclick="switchView('list')">
                        List
                    </button>
                </div>
            </div>
        </div>

        <!-- Search and Stats Bar -->
        <div class="stats-bar">
            <div class="stats-item">
                <span class="stat-label">Total Files:</span>
                <span class="stat-value" th:text="${media.size()}">0</span>
            </div>

            <div class="search-box">
                <input type="text"
                       id="mediaSearch"
                       placeholder="Search by alt text or post title..."
                       class="search-input"
                       oninput="filterMedia(this.value)">
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${media.isEmpty()}" class="empty-state">
            <div class="empty-icon">🖼️</div>
            <p class="empty-message">No media files uploaded yet</p>
            <p class="empty-help">Upload images while editing posts to see them here</p>
            <a th:href="@{/manage/posts}" class="btn btn-primary">Go to Posts</a>
        </div>

        <!-- Media Grid View -->
        <div id="gridView" class="media-grid-view" th:if="${!media.isEmpty()}">
            <div th:each="item : ${media}"
                 class="media-card"
                 th:data-post-title="${item.blogPost.title}"
                 th:data-alt-text="${item.altText ?: ''}">

                <div class="media-card-image">
                    <img th:src="${item.url}"
                         th:alt="${item.altText}"
                         class="media-img"
                         loading="lazy">

                    <div class="media-card-overlay">
                        <button type="button"
                                class="btn-icon btn-view"
                                   th:attr="data-url=${item.url},data-alt=${item.altText ?: ''}"
                                   onclick="event.preventDefault(); viewImage(this.dataset.url, this.dataset.alt)">
                            👁️ View
                        </button>
                        <button type="button"
                                class="btn-icon btn-delete"
                                th:data-media-id="${item.id}"
                                onclick="deleteMedia(this)">
                            🗑️ Delete
                        </button>
                    </div>

                    <span th:if="${item.displayOrder == 0}" class="cover-badge">Cover</span>
                </div>

                <div class="media-card-info">
                    <p class="media-alt" th:text="${item.altText ?: 'No alt text'}">Alt text</p>
                    <div class="media-meta">
                        <span class="meta-item">
                            <a th:href="@{/manage/posts/{id}/edit(id=${item.blogPost.id})}"
                               class="post-link"
                               th:text="${item.blogPost.title}">
                                Post Title
                            </a>
                        </span>
                        <span class="meta-item text-muted"
                              th:text="${#temporals.format(item.createdAt, 'MMM dd, yyyy')}">
                            Date
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Media List View (Hidden by default) -->
        <div id="listView" class="media-list-view" style="display: none;" th:if="${!media.isEmpty()}">
            <table class="media-table">
                <thead>
                    <tr>
                        <th class="col-preview">Preview</th>
                        <th class="col-alt">Alt Text</th>
                        <th class="col-post">Post</th>
                        <th class="col-date">Uploaded</th>
                        <th class="col-actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${media}"
                        class="media-row"
                        th:data-post-title="${item.blogPost.title}"
                        th:data-alt-text="${item.altText ?: ''}">

                        <td class="col-preview">
                            <div class="preview-thumbnail">
                                <img th:src="${item.url}"
                                     th:alt="${item.altText}"
                                     class="preview-img"
                                     loading="lazy">
                                <span th:if="${item.displayOrder == 0}" class="cover-badge-small">Cover</span>
                            </div>
                        </td>

                        <td class="col-alt">
                            <span th:text="${item.altText ?: 'No alt text'}">Alt text</span>
                        </td>

                        <td class="col-post">
                            <a th:href="@{/manage/posts/{id}/edit(id=${item.blogPost.id})}"
                               class="post-link"
                               th:text="${item.blogPost.title}">
                                Post Title
                            </a>
                        </td>

                        <td class="col-date">
                            <span th:text="${#temporals.format(item.createdAt, 'MMM dd, yyyy')}">
                                Date
                            </span>
                        </td>

                        <td class="col-actions">
                            <div class="action-buttons">
                                <button type="button"
                                        class="btn-icon"
                                               th:attr="data-url=${item.url},data-alt=${item.altText ?: ''}"
                                               onclick="event.preventDefault(); viewImage(this.dataset.url, this.dataset.alt)">
                                    👁️
                                </button>
                                <button type="button"
                                        class="btn-icon btn-delete"
                                        th:data-media-id="${item.id}"
                                        onclick="deleteMedia(this)">
                                    🗑️
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Image Viewer Modal -->
        <div id="imageModal" class="modal" onclick="closeModal()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="closeModal()">×</button>
                <img id="modalImage" src="" alt="" class="modal-img">
                <div class="modal-info">
                    <p id="modalAltText"></p>
                    <a id="modalImageLink" href="" target="_blank" class="btn btn-secondary">
                        Open in New Tab
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Page-specific CSS -->
    <th:block layout:fragment="extra-css">
        <style>
            .page-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2rem;
            }

            .page-title {
                font-size: 2rem;
                display: flex;
                align-items: center;
                gap: 1rem;
                margin: 0;
            }

            .count-badge {
                background: rgba(0, 255, 255, 0.2);
                color: var(--neon-cyan);
                padding: 0.25rem 0.75rem;
                border-radius: 20px;
                font-size: 1rem;
            }

            .view-toggle {
                display: flex;
                background: var(--surface-dark);
                border: 1px solid var(--border-color);
                border-radius: 4px;
                overflow: hidden;
            }

            .toggle-btn {
                padding: 0.5rem 1rem;
                background: transparent;
                border: none;
                color: var(--text-secondary);
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .toggle-btn.active {
                background: var(--neon-cyan);
                color: var(--background-dark);
            }

            .stats-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1rem;
                background: var(--surface-dark);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                margin-bottom: 2rem;
                gap: 1rem;
            }

            .stats-item {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .stat-label {
                color: var(--text-secondary);
            }

            .stat-value {
                color: var(--neon-cyan);
                font-weight: 600;
                font-size: 1.125rem;
            }

            .search-box {
                flex: 1;
                max-width: 400px;
            }

            .search-input {
                width: 100%;
                padding: 0.5rem 1rem;
                background: var(--background-dark);
                border: 1px solid var(--border-color);
                border-radius: 4px;
                color: var(--text-primary);
            }

            .search-input:focus {
                outline: none;
                border-color: var(--neon-cyan);
                box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            }

            .empty-state {
                padding: 4rem 2rem;
                text-align: center;
            }

            .empty-icon {
                font-size: 4rem;
                margin-bottom: 1rem;
            }

            .empty-message {
                font-size: 1.25rem;
                color: var(--text-primary);
                margin-bottom: 0.5rem;
            }

            .empty-help {
                color: var(--text-secondary);
                margin-bottom: 1.5rem;
            }

            /* Grid View */
            .media-grid-view {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.5rem;
            }

            .media-card {
                background: var(--surface-dark);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                overflow: hidden;
                transition: all 0.3s ease;
            }

            .media-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 4px 20px rgba(0, 255, 255, 0.2);
            }

            .media-card-image {
                position: relative;
                aspect-ratio: 1;
                overflow: hidden;
            }

            .media-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .media-card-overlay {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .media-card:hover .media-card-overlay {
                opacity: 1;
            }

            .cover-badge {
                position: absolute;
                top: 0.5rem;
                right: 0.5rem;
                background: var(--neon-cyan);
                color: var(--background-dark);
                padding: 0.25rem 0.5rem;
                border-radius: 4px;
                font-size: 0.75rem;
                font-weight: 600;
            }

            .cover-badge-small {
                background: var(--neon-cyan);
                color: var(--background-dark);
                padding: 0.125rem 0.375rem;
                border-radius: 3px;
                font-size: 0.625rem;
                font-weight: 600;
                margin-left: 0.5rem;
            }

            .media-card-info {
                padding: 1rem;
            }

            .media-alt {
                margin: 0 0 0.5rem 0;
                color: var(--text-primary);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .media-meta {
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
                font-size: 0.875rem;
            }

            .post-link {
                color: var(--neon-blue);
                text-decoration: none;
            }

            .post-link:hover {
                text-decoration: underline;
            }

            /* List View */
            .media-list-view {
                background: var(--surface-dark);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                overflow: hidden;
            }

            .media-table {
                width: 100%;
                border-collapse: collapse;
            }

            .media-table thead {
                background: var(--background-dark);
                border-bottom: 2px solid var(--neon-cyan);
            }

            .media-table th {
                padding: 1rem;
                text-align: left;
                color: var(--neon-cyan);
                font-weight: 600;
            }

            .media-table td {
                padding: 1rem;
                border-bottom: 1px solid var(--border-color);
            }

            .media-row:hover {
                background: rgba(0, 255, 255, 0.05);
            }

            .preview-thumbnail {
                width: 60px;
                height: 60px;
                border-radius: 4px;
                overflow: hidden;
                border: 1px solid var(--border-color);
                position: relative;
                display: inline-flex;
                align-items: center;
            }

            .preview-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .action-buttons {
                display: flex;
                gap: 0.5rem;
            }

            .btn-icon {
                padding: 0.5rem;
                background: transparent;
                border: 1px solid var(--border-color);
                border-radius: 4px;
                cursor: pointer;
                transition: all 0.3s ease;
                font-size: 1.25rem;
                color: var(--text-primary);
            }

            .btn-view:hover {
                background: rgba(0, 255, 255, 0.2);
                border-color: var(--neon-cyan);
                color: var(--neon-cyan);
            }

            .btn-delete {
                background: transparent;
            }

            .btn-delete:hover {
                background: rgba(255, 50, 50, 0.2);
                border-color: var(--error);
                color: var(--error);
            }

            /* Modal */
            .modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.9);
                z-index: 1000;
                align-items: center;
                justify-content: center;
            }

            .modal.active {
                display: flex;
            }

            .modal-content {
                position: relative;
                max-width: 90%;
                max-height: 90%;
                background: var(--surface-dark);
                border: 2px solid var(--neon-cyan);
                border-radius: 8px;
                padding: 2rem;
            }

            .modal-close {
                position: absolute;
                top: 0.5rem;
                right: 0.5rem;
                background: transparent;
                border: none;
                color: var(--text-primary);
                font-size: 2rem;
                cursor: pointer;
                padding: 0.5rem;
                line-height: 1;
            }

            .modal-close:hover {
                color: var(--error);
            }

            .modal-img {
                max-width: 100%;
                max-height: 70vh;
                border-radius: 4px;
            }

            .modal-info {
                margin-top: 1rem;
                text-align: center;
            }

            .modal-info p {
                color: var(--text-secondary);
                margin-bottom: 1rem;
            }

            .text-muted {
                color: var(--text-secondary);
            }

            .col-preview {
                width: 80px;
            }

            .col-date {
                width: 130px;
            }

            .col-actions {
                width: 120px;
            }

            @media (max-width: 768px) {
                .media-grid-view {
                    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                    gap: 1rem;
                }

                .stats-bar {
                    flex-direction: column;
                    align-items: stretch;
                }

                .search-box {
                    max-width: 100%;
                }

                .media-table thead {
                    display: none;
                }

                .media-table,
                .media-table tbody,
                .media-table tr,
                .media-table td {
                    display: block;
                    width: 100%;
                }

                .media-row {
                    margin-bottom: 1rem;
                    border: 1px solid var(--border-color);
                    border-radius: 8px;
                    padding: 1rem;
                }

                .media-row td {
                    border-bottom: none;
                    padding: 0.5rem 0;
                }
            }
        </style>
    </th:block>

    <!-- Page-specific JavaScript -->
    <th:block layout:fragment="extra-js">
        <script>
            function switchView(view) {
                const gridView = document.getElementById('gridView');
                const listView = document.getElementById('listView');
                const buttons = document.querySelectorAll('.toggle-btn');

                buttons.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.view === view);
                });

                if (view === 'grid') {
                    gridView.style.display = 'grid';
                    listView.style.display = 'none';
                } else {
                    gridView.style.display = 'none';
                    listView.style.display = 'block';
                }
            }

            function viewImage(imageUrl, altText) {
                const modal = document.getElementById('imageModal');
                const modalImage = document.getElementById('modalImage');
                const modalAltText = document.getElementById('modalAltText');
                const modalLink = document.getElementById('modalImageLink');

                modalImage.src = imageUrl;
                modalImage.alt = altText;
                modalAltText.textContent = altText || 'No alt text';
                modalLink.href = imageUrl;

                modal.classList.add('active');
            }

            function closeModal() {
                const modal = document.getElementById('imageModal');
                modal.classList.remove('active');
            }

            const filterMedia = adminUtils.debounce(function(query) {
                const cards = document.querySelectorAll('.media-card, .media-row');
                const lowerQuery = query.toLowerCase();

                cards.forEach(card => {
                    const postTitle = (card.dataset.postTitle || '').toLowerCase();
                    const altText = (card.dataset.altText || '').toLowerCase();

                    const matches = postTitle.includes(lowerQuery) || altText.includes(lowerQuery);
                    card.style.display = matches ? '' : 'none';
                });
            }, 200);

            function deleteMedia(button) {
                if (!adminUtils.confirmDelete('this media file', () => {})) { return; }

                const mediaId = button.dataset.mediaId;

                fetch(`/manage/api/media/${mediaId}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Remove from UI
                        const card = button.closest('.media-card, .media-row');
                        card.remove();

                        // Update count
                        const countBadges = document.querySelectorAll('.count-badge, .stat-value');
                        countBadges.forEach(badge => {
                            const currentCount = parseInt(badge.textContent);
                            badge.textContent = currentCount - 1;
                        });

                        adminUtils.showFlash('Media deleted', 'success');
                        // Check if empty and reload if necessary
                        const remainingCards = document.querySelectorAll('.media-card, .media-row');
                        if (remainingCards.length === 0) {
                            location.reload();
                        }
                    } else {
                        adminUtils.showFlash('Failed to delete media: ' + (data.error || 'Unknown error'), 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    adminUtils.showFlash('An error occurred while deleting the media', 'error');
                });
            }

            // Close modal on Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
        </script>
        <script th:src="@{/admin/js/media-upload.js}"></script>
        <script th:src="@{/admin/js/media-reorder.js}"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Media Manager is global; no postId context here
                if (window.initMediaReorder) { window.initMediaReorder(); }
            });
        </script>
    </th:block>
</body>
</html>
