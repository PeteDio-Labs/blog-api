<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">
<head>
    <title th:text="${post.id != null ? 'Edit Post' : 'New Post'}">Post Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
</head>
<body>
    <div layout:fragment="content">
        <!-- Page Header -->
        <div class="page-header">
            <div class="header-left">
                <a th:href="@{/manage/posts}" class="btn-back">
                    ← Back to Posts
                </a>
                <h2 class="page-title">
                    <span class="neon-text" th:text="${post.id != null ? 'Edit Post' : 'New Post'}">
                        New Post
                    </span>
                </h2>
            </div>
            <div class="header-right">
                <button type="submit" form="postForm" class="btn btn-primary">
                    <span th:text="${post.id != null ? 'Update Post' : 'Create Post'}">Save</span>
                </button>
            </div>
        </div>

        <!-- Post Form -->
        <form id="postForm"
              th:action="${post.id != null ? '/manage/posts/' + post.id : '/manage/posts'}"
              method="post">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-layout">
                <!-- Main Editor Column -->
                <div class="editor-column">
                    <!-- Title -->
                    <div class="form-group">
                        <label for="title" class="form-label required">Title</label>
                        <input type="text"
                               id="title"
                               name="title"
                               th:value="${post.title}"
                               class="form-control title-input"
                               placeholder="Enter post title..."
                               required
                               autofocus>
                    </div>

                    <!-- Excerpt -->
                    <div class="form-group">
                        <label for="excerpt" class="form-label">Excerpt</label>
                        <textarea id="excerpt"
                                  name="excerpt"
                                  th:text="${post.excerpt}"
                                  class="form-control excerpt-input"
                                  rows="2"
                                  placeholder="Brief summary (optional)..."></textarea>
                    </div>

                    <!-- Markdown Editor -->
                    <div class="form-group">
                        <label for="content" class="form-label required">Content</label>
                        <textarea id="content"
                                  name="content"
                                  th:text="${post.content}"
                                  class="form-control"
                                  required></textarea>
                    </div>
                </div>

                <!-- Sidebar Column -->
                <div class="sidebar-column">
                    <!-- Status -->
                    <div class="form-section">
                        <h3 class="section-title">Status</h3>
                        <select id="status" name="status" class="form-control">
                            <option value="DRAFT" th:selected="${post.status == 'DRAFT' or post.status == null}">Draft</option>
                            <option value="PUBLISHED" th:selected="${post.status == 'PUBLISHED'}">Published</option>
                        </select>
                    </div>

                    <!-- Tags -->
                    <div class="form-section">
                        <h3 class="section-title">Tags</h3>
                        <div class="tags-input-container">
                            <div id="selectedTags" class="selected-tags">
                                <span th:each="tag : ${post.blogTags}"
                                      class="tag-pill"
                                      th:data-tag="${tag.tagName}">
                                    <span th:text="${tag.tagName}">tag</span>
                                    <button type="button" class="tag-remove" onclick="removeTag(this)">×</button>
                                </span>
                            </div>

                            <input type="text"
                                   id="tagInput"
                                   class="form-control"
                                   placeholder="Add tags..."
                                   autocomplete="off"
                                   onkeypress="handleTagInput(event)">

                            <input type="hidden" id="tagsField" name="tags" th:value="${#strings.listJoin(post.tags, ',')}">

                            <div id="tagSuggestions" class="tag-suggestions" style="display: none;"></div>
                        </div>

                        <div class="existing-tags">
                            <p class="help-text">Existing tags:</p>
                            <div class="tag-list">
                                <button type="button"
                                        th:each="tagObj : ${allTags}"
                                        class="tag-suggestion-btn"
                                        th:text="${tagObj.tagName}"
                                        th:onclick="'addTag(\\'' + ${tagObj.tagName} + '\\')'"
                                        onclick="event.preventDefault()">
                                    tag
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Media Gallery (Edit Mode Only) -->
                    <div class="form-section" th:if="${post.id != null}">
                        <h3 class="section-title">
                            Media Gallery
                            <span class="media-count" th:text="${post.media != null ? post.media.size() : 0}">0</span>
                        </h3>

                        <!-- Upload Area -->
                        <div id="uploadArea" class="upload-area">
                            <input type="file"
                                   id="mediaUpload"
                                   accept="image/*"
                                   multiple
                                   style="display: none;">

                            <div class="upload-prompt">
                                <span class="upload-icon">📤</span>
                                <p>Drag and drop images here</p>
                                <button type="button" class="btn btn-secondary" onclick="document.getElementById('mediaUpload').click()">
                                    Browse Files
                                </button>
                            </div>

                            <div id="uploadProgress" class="upload-progress" style="display: none;">
                                <div class="progress-bar">
                                    <div id="progressFill" class="progress-fill"></div>
                                </div>
                                <p id="progressText">Uploading...</p>
                            </div>
                        </div>

                        <!-- Media Grid -->
                        <div id="mediaGrid" class="media-grid">
                            <div th:each="item : ${post.media}"
                                 class="media-item"
                                 th:data-media-id="${item.id}"
                                 th:data-display-order="${item.displayOrder}">
                                <div class="media-thumbnail">
                                    <img th:src="${item.url}"
                                         th:alt="${item.altText}"
                                         class="media-img">
                                    <div class="media-overlay">
                                        <button type="button"
                                                class="btn btn-sm btn-secondary"
                                                th:onclick="'setAsCover(' + ${item.id} + ')'"
                                                onclick="event.preventDefault()">
                                            Set as Cover
                                        </button>
                                        <button type="button"
                                                class="btn btn-sm btn-danger"
                                                th:onclick="'deleteMedia(' + ${item.id} + ')'"
                                                onclick="event.preventDefault()">
                                            Delete
                                        </button>
                                    </div>
                                    <span th:if="${item.displayOrder == 0}" class="cover-badge">Cover</span>
                                </div>
                                <input type="text"
                                       class="form-control media-alt-input"
                                       th:value="${item.altText}"
                                       th:data-media-id="${item.id}"
                                       placeholder="Alt text..."
                                       onblur="updateAltText(this)">
                            </div>
                        </div>
                    </div>

                    <!-- Note for New Posts -->
                    <div class="form-section" th:if="${post.id == null}">
                        <div class="info-box">
                            <span class="info-icon">ℹ️</span>
                            <p>Save the post first to upload media and set a cover image.</p>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <!-- Page-specific CSS -->
    <th:block layout:fragment="extra-css">
        <style>
            .page-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2rem;
            }

            .header-left {
                display: flex;
                align-items: center;
                gap: 1rem;
            }

            .header-right {
                display: flex;
                gap: 0.5rem;
            }

            .btn-back {
                color: var(--text-secondary);
                text-decoration: none;
                transition: color 0.3s ease;
            }

            .btn-back:hover {
                color: var(--neon-cyan);
            }

            .page-title {
                margin: 0;
                font-size: 2rem;
            }

            .form-layout {
                display: grid;
                grid-template-columns: 1fr 350px;
                gap: 2rem;
            }

            .editor-column {
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
            }

            .sidebar-column {
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
            }

            .form-group {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }

            .form-label {
                color: var(--text-primary);
                font-weight: 600;
            }

            .form-label.required::after {
                content: ' *';
                color: var(--error);
            }

            .title-input {
                font-size: 1.5rem;
                font-weight: 600;
            }

            .excerpt-input {
                resize: vertical;
            }

            .form-section {
                background: var(--surface-dark);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                padding: 1.5rem;
            }

            .section-title {
                margin: 0 0 1rem 0;
                color: var(--neon-cyan);
                font-size: 1.125rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .media-count {
                background: rgba(0, 255, 255, 0.2);
                color: var(--neon-cyan);
                padding: 0.125rem 0.5rem;
                border-radius: 12px;
                font-size: 0.875rem;
            }

            .selected-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
                margin-bottom: 0.5rem;
                min-height: 32px;
            }

            .tag-pill {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                background: rgba(92, 158, 255, 0.2);
                color: var(--neon-blue);
                padding: 0.375rem 0.75rem;
                border-radius: 16px;
                border: 1px solid var(--neon-blue);
            }

            .tag-remove {
                background: transparent;
                border: none;
                color: var(--neon-blue);
                font-size: 1.25rem;
                cursor: pointer;
                padding: 0;
                line-height: 1;
            }

            .tag-remove:hover {
                color: var(--error);
            }

            .tag-suggestions {
                position: absolute;
                background: var(--surface-dark);
                border: 1px solid var(--border-color);
                border-radius: 4px;
                max-height: 200px;
                overflow-y: auto;
                z-index: 10;
                margin-top: 0.25rem;
            }

            .tag-suggestion-item {
                padding: 0.5rem 1rem;
                cursor: pointer;
                transition: background 0.3s ease;
            }

            .tag-suggestion-item:hover {
                background: rgba(0, 255, 255, 0.1);
            }

            .existing-tags {
                margin-top: 1rem;
            }

            .help-text {
                color: var(--text-secondary);
                font-size: 0.875rem;
                margin-bottom: 0.5rem;
            }

            .tag-list {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .tag-suggestion-btn {
                padding: 0.375rem 0.75rem;
                background: rgba(92, 158, 255, 0.1);
                border: 1px solid var(--neon-blue);
                border-radius: 12px;
                color: var(--neon-blue);
                cursor: pointer;
                font-size: 0.875rem;
                transition: all 0.3s ease;
            }

            .tag-suggestion-btn:hover {
                background: rgba(92, 158, 255, 0.3);
            }

            .upload-area {
                border: 2px dashed var(--border-color);
                border-radius: 8px;
                padding: 2rem;
                text-align: center;
                margin-bottom: 1rem;
                transition: all 0.3s ease;
            }

            .upload-area.drag-over {
                border-color: var(--neon-cyan);
                background: rgba(0, 255, 255, 0.05);
            }

            .upload-icon {
                font-size: 2rem;
                display: block;
                margin-bottom: 0.5rem;
            }

            .upload-prompt p {
                color: var(--text-secondary);
                margin: 0.5rem 0;
            }

            .upload-progress {
                padding: 1rem;
            }

            .progress-bar {
                width: 100%;
                height: 8px;
                background: var(--background-dark);
                border-radius: 4px;
                overflow: hidden;
                margin-bottom: 0.5rem;
            }

            .progress-fill {
                height: 100%;
                background: var(--neon-cyan);
                transition: width 0.3s ease;
                width: 0%;
            }

            .media-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .media-item {
                position: relative;
            }

            .media-thumbnail {
                position: relative;
                aspect-ratio: 1;
                border-radius: 4px;
                overflow: hidden;
                border: 1px solid var(--border-color);
                margin-bottom: 0.5rem;
            }

            .media-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .media-overlay {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .media-item:hover .media-overlay {
                opacity: 1;
            }

            .cover-badge {
                position: absolute;
                top: 0.5rem;
                right: 0.5rem;
                background: var(--neon-cyan);
                color: var(--background-dark);
                padding: 0.25rem 0.5rem;
                border-radius: 4px;
                font-size: 0.75rem;
                font-weight: 600;
            }

            .media-alt-input {
                font-size: 0.875rem;
            }

            .info-box {
                display: flex;
                gap: 0.75rem;
                padding: 1rem;
                background: rgba(92, 158, 255, 0.1);
                border: 1px solid var(--neon-blue);
                border-radius: 4px;
                color: var(--text-primary);
            }

            .info-icon {
                font-size: 1.5rem;
            }

            .info-box p {
                margin: 0;
            }

            .btn-sm {
                padding: 0.375rem 0.75rem;
                font-size: 0.875rem;
            }

            /* EasyMDE Customization */
            .CodeMirror {
                height: 500px;
                border: 1px solid var(--border-color);
                border-radius: 4px;
                background: var(--surface-dark);
                color: var(--text-primary);
            }

            .CodeMirror-cursor {
                border-left-color: var(--neon-cyan);
            }

            .editor-toolbar {
                background: var(--background-dark);
                border: 1px solid var(--border-color);
                border-bottom: none;
            }

            .editor-toolbar button {
                color: var(--text-primary) !important;
            }

            .editor-toolbar button:hover,
            .editor-toolbar button.active {
                background: var(--surface-dark);
                border-color: var(--neon-cyan);
            }

            .editor-preview {
                background: var(--surface-dark);
                color: var(--text-primary);
            }

            @media (max-width: 1024px) {
                .form-layout {
                    grid-template-columns: 1fr;
                }

                .media-grid {
                    grid-template-columns: repeat(3, 1fr);
                }
            }

            @media (max-width: 768px) {
                .media-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }
        </style>
    </th:block>

    <!-- Page-specific JavaScript -->
    <th:block layout:fragment="extra-js">
        <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
        <script th:inline="javascript">
            /*<![CDATA[*/
            const postId = /*[[${post.id}]]*/ null;
            const allTagsData = /*[[${allTags}]]*/ [];

            // Initialize EasyMDE
            let easyMDE;
            document.addEventListener('DOMContentLoaded', function() {
                easyMDE = new EasyMDE({
                    element: document.getElementById('content'),
                    spellChecker: false,
                    autosave: {
                        enabled: true,
                        uniqueId: 'blog-post-' + (postId || 'new'),
                        delay: 1000,
                    },
                    toolbar: [
                        'bold', 'italic', 'heading', '|',
                        'quote', 'unordered-list', 'ordered-list', '|',
                        'link', 'image', '|',
                        'preview', 'side-by-side', 'fullscreen', '|',
                        'guide'
                    ],
                    status: ['lines', 'words', 'cursor'],
                });
            });

            // Tag management
            function handleTagInput(event) {
                if (event.key === 'Enter' || event.key === ',') {
                    event.preventDefault();
                    const input = event.target;
                    const tag = input.value.trim().replace(',', '');
                    if (tag) {
                        addTag(tag);
                        input.value = '';
                    }
                }
            }

            function addTag(tagName) {
                const selectedTags = document.getElementById('selectedTags');
                const existingTags = Array.from(selectedTags.querySelectorAll('.tag-pill'))
                    .map(pill => pill.dataset.tag);

                if (!existingTags.includes(tagName)) {
                    const pill = document.createElement('span');
                    pill.className = 'tag-pill';
                    pill.dataset.tag = tagName;
                    pill.innerHTML = `
                        <span>${tagName}</span>
                        <button type="button" class="tag-remove" onclick="removeTag(this)">×</button>
                    `;
                    selectedTags.appendChild(pill);
                    updateTagsField();
                }
            }

            function removeTag(button) {
                button.closest('.tag-pill').remove();
                updateTagsField();
            }

            function updateTagsField() {
                const tags = Array.from(document.querySelectorAll('.tag-pill'))
                    .map(pill => pill.dataset.tag);
                document.getElementById('tagsField').value = tags.join(',');
            }

            // Media upload (if in edit mode)
            if (postId) {
                const uploadArea = document.getElementById('uploadArea');
                const fileInput = document.getElementById('mediaUpload');

                // Drag and drop
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.classList.add('drag-over');
                });

                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.classList.remove('drag-over');
                });

                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('drag-over');
                    const files = e.dataTransfer.files;
                    uploadFiles(files);
                });

                fileInput.addEventListener('change', (e) => {
                    uploadFiles(e.target.files);
                });
            }

            function uploadFiles(files) {
                const formData = new FormData();
                formData.append('file', files[0]); // Upload one at a time
                formData.append('postId', postId);

                const progress = document.getElementById('uploadProgress');
                const prompt = document.querySelector('.upload-prompt');
                const progressFill = document.getElementById('progressFill');
                const progressText = document.getElementById('progressText');

                prompt.style.display = 'none';
                progress.style.display = 'block';
                progressFill.style.width = '50%';

                fetch('/manage/api/media/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        progressFill.style.width = '100%';
                        setTimeout(() => {
                            location.reload(); // Reload to show new media
                        }, 500);
                    } else {
                        alert('Upload failed: ' + data.error);
                        prompt.style.display = 'block';
                        progress.style.display = 'none';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Upload failed');
                    prompt.style.display = 'block';
                    progress.style.display = 'none';
                });
            }

            function setAsCover(mediaId) {
                fetch(`/manage/api/posts/${postId}/cover-image`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ mediaId: mediaId })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert('Failed to set cover: ' + data.error);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to set cover image');
                });
            }

            function deleteMedia(mediaId) {
                if (!confirm('Are you sure you want to delete this media?')) {
                    return;
                }

                fetch(`/manage/api/media/${mediaId}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert('Failed to delete: ' + data.error);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to delete media');
                });
            }

            function updateAltText(input) {
                const mediaId = input.dataset.mediaId;
                const altText = input.value;

                fetch(`/manage/api/media/${mediaId}/alt-text`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ altText: altText })
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.success) {
                        alert('Failed to update alt text: ' + data.error);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            }
            /*]]>*/
        </script>
    </th:block>
</body>
</html>
