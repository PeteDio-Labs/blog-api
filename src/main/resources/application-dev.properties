app.environment=dev

# Development environment admin credentials
admin.username=admin
admin.password=admin123

# Enable H2 console for dev (if needed)
spring.h2.console.enabled=true

# Flyway Configuration for Dev: Use filesystem location for hot-reload
# In Docker, migrations are mounted at /app/db/migration via docker-compose override
spring.flyway.locations=filesystem:/app/db/migration
