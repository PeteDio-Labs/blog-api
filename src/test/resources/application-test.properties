# Test configuration with H2 in-memory database
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# Disable Flyway for tests - use JPA to create schema
spring.flyway.enabled=false

# JPA/Hibernate (H2Dialect is auto-detected)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable Thymeleaf template check for tests
spring.thymeleaf.check-template-location=false

# Application config
app.environment=test
app.version=1.0.0-TEST

# Media storage for tests
media.storage.path=${java.io.tmpdir}/blog-test-media

# Spring Boot multipart settings for tests
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Test admin credentials
admin.username=admin
admin.password=admin123
