services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: petedillo_blog
      POSTGRES_USER: blog_app
      POSTGRES_PASSWORD: dev_app_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_app -d petedillo_blog"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: petedillo_blog
      DB_USERNAME: blog_app
      DB_PASSWORD: dev_app_password
      APP_ENVIRONMENT: dev
      APP_VERSION: 1.0.0
    depends_on:
      db:
        condition: service_healthy
