spring.application.name=blog-api

# Media Storage Configuration
media.storage.path=${MEDIA_STORAGE_PATH:/app/media/images}
media.max-file-size=10MB
media.max-request-size=10MB

# Spring Boot file upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# =============================================================================
# NOTE: For Tomcat multipart limits, use server.tomcat.max-* properties
# if needed for handling large multipart uploads.
# =============================================================================

# Application configuration
app.environment=${APP_ENVIRONMENT:dev}
app.version=0.7.1

# Thymeleaf settings
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.table=flyway_schema_history

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petedillo_blog}
spring.datasource.username=${DB_USERNAME:blog_app}
spring.datasource.password=${DB_PASSWORD:dev_app_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Actuator / Health Check Configuration
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoints.web.exposure.include=health

# Admin credentials (for local dev)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}

# Security settings
spring.security.user.name=${admin.username}
spring.security.user.password=${admin.password}

# OAuth2 placeholders (future implementation)
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Proxy/HTTPS configuration for Cloudflare Tunnel + K8s Ingress
# Cloudflare terminates HTTPS, then forwards HTTP to ingress
# Spring Boot needs to trust proxy headers to understand original protocol
server.forward-headers-strategy=NATIVE
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto
server.tomcat.remoteip.protocol-header-https-value=https
