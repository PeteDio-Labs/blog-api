services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: petedillo_blog
      POSTGRES_USER: petedillo
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petedillo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petedillo_blog
      SPRING_DATASOURCE_USERNAME: petedillo
      SPRING_DATASOURCE_PASSWORD: dev_password
      SPRING_PROFILES_ACTIVE: dev
      APP_ENVIRONMENT: dev
      DB_PASSWORD: dev_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

volumes:
  postgres_data:
