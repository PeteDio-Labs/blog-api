name: Build and Deploy API

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  pull-requests: write

env:
  NEXUS_REGISTRY: docker.toastedbytes.com

jobs:
  # PR builds: Typecheck, test, validate Docker build
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Build Docker image (validation only)
        run: docker build -t blog-api:pr-${{ github.event.pull_request.number }} .

      - name: Summary
        run: |
          echo "### Build Validation :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR #${{ github.event.pull_request.number }}**: Typecheck, tests, and Docker build successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Branch**: ${{ github.base_ref }}" >> $GITHUB_STEP_SUMMARY

  # Push to main/develop: Build, test, push to registry
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Determine Docker tag
        id: docker-tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=main-latest" >> $GITHUB_OUTPUT
            echo "extra_tag=prod-latest" >> $GITHUB_OUTPUT
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=develop-latest" >> $GITHUB_OUTPUT
            echo "extra_tag=dev-latest" >> $GITHUB_OUTPUT
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Nexus Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.NEXUS_REGISTRY }}/blog-api:${{ steps.docker-tag.outputs.tag }}
            ${{ steps.docker-tag.outputs.extra_tag && format('{0}/blog-api:{1}', env.NEXUS_REGISTRY, steps.docker-tag.outputs.extra_tag) || '' }}
            ${{ env.NEXUS_REGISTRY }}/blog-api:${{ github.sha }}

      - name: Summary
        run: |
          echo "### Deployment Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ steps.docker-tag.outputs.env }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Images**: \`blog-api:${{ steps.docker-tag.outputs.tag }}\`, \`blog-api:${{ steps.docker-tag.outputs.extra_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ${{ env.NEXUS_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GitOps**: ArgoCD Image Updater will detect and update blog-gitops" >> $GITHUB_STEP_SUMMARY
